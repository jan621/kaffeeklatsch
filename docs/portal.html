<!doctype html>
<html lang="de-CH">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>Übersicht · Hostflow Kundenportal</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%2317181A%22/><text x=%2250%22 y=%2272%22 font-size=%2260%22 text-anchor=%22middle%22 fill=%22white%22 font-family=%22sans-serif%22 font-weight=%22bold%22>h</text></svg>">
<link rel="stylesheet" href="assets/style.css">
</head>
<body>
<div class="topbar">
  <div class="topbar-in">
    <img class="logo" src="assets/logo.svg" alt="Hostflow">
    <div class="client">
      <span id="clientname"></span>
      <button class="btn-ghost" id="logout">Abmelden</button>
    </div>
  </div>
</div>

<div class="shell">
  <div class="page-head">
    <p class="eyebrow">Abrechnung Objektmanagement</p>
    <h1 id="propertyname">&nbsp;</h1>
  </div>
  <div class="tabs" id="tabs"></div>
  <div id="view"><p class="empty">Daten werden geladen…</p></div>
  <div class="portal-foot">
    <span>Hostflow · jan@hostflow.ch</span>
    <span id="footnote"></span>
  </div>
</div>
<div id="tip" role="presentation"></div>

<script>
"use strict";
const PALETTE = ["#A85D14", "#2A78D6", "#1baf7a", "#4a3aa7"];
const INK = "#17181A", INK2 = "#55585E", MUTED = "#8A8D93", GRID = "#F1F1F3", AXIS = "#D6D7DA";
const fmt = n => n.toLocaleString("de-CH", { minimumFractionDigits: 2, maximumFractionDigits: 2 }).replace(/’/g, "'");
const fmt0 = n => Math.round(n).toLocaleString("de-CH").replace(/’/g, "'");
const round2 = n => Math.round(n * 100) / 100;
const round05 = n => Math.round(n * 20) / 20;

let DATA = null, COLOR = {};

async function boot() {
  let res;
  try { res = await fetch("/api/data"); }
  catch { location.href = "/"; return; }
  if (!res.ok) { location.href = "/"; return; }
  const payload = await res.json();
  DATA = payload.data;
  document.getElementById("clientname").innerHTML = `<b>${esc(payload.user.displayName)}</b>`;
  document.getElementById("propertyname").textContent = DATA.property;
  DATA.objects.forEach((o, i) => COLOR[o] = PALETTE[i % PALETTE.length]);
  buildTabs();
}

function esc(s) { return String(s).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c])); }

/* ---------- Tabs ---------- */
let activeTab = null;
function buildTabs() {
  const tabs = [];
  const years = [...new Set(DATA.quarters.map(q => q.year))].sort();
  for (const q of DATA.quarters) tabs.push({ id: q.id, label: q.label, render: () => renderQuarter(q) });
  for (const y of years) tabs.push({ id: `year-${y}`, label: `Jahr ${y}`, render: () => renderYear(y) });
  const nav = document.getElementById("tabs");
  nav.innerHTML = "";
  for (const t of tabs) {
    const b = document.createElement("button");
    b.className = "tab"; b.textContent = t.label; b.dataset.id = t.id;
    b.addEventListener("click", () => activate(t, tabs));
    nav.appendChild(b);
  }
  activate(tabs[tabs.length - 2] || tabs[0], tabs); // aktuellstes Quartal als Standard
}
function activate(tab, tabs) {
  activeTab = tab.id;
  document.querySelectorAll(".tab").forEach(b => b.classList.toggle("active", b.dataset.id === tab.id));
  const view = document.getElementById("view");
  view.innerHTML = "";
  tab.render();
}

/* ---------- Bausteine ---------- */
function kpiRow(items) {
  const div = document.createElement("div");
  div.className = "kpis";
  div.innerHTML = items.map((k, i) =>
    `<div class="kpi${i === 0 ? " lead" : ""}"><span class="lbl">${k.lbl}</span><span class="val">${k.val}</span>${k.cap ? `<span class="cap">${k.cap}</span>` : ""}</div>`).join("");
  return div;
}
function legendHtml() {
  return `<div class="legend">${DATA.objects.map(o => `<span><i class="sw" style="background:${COLOR[o]}"></i>${esc(o)}</span>`).join("")}</div>`;
}
function chartCard(title, note) {
  const card = document.createElement("div");
  card.className = "card";
  card.innerHTML = `<h2>${title}</h2>${note ? `<p class="note">${note}</p>` : ""}<div class="mount"></div>${legendHtml()}`;
  return card;
}

/* ---------- Tooltip ---------- */
const tip = document.getElementById("tip");
function showTip(evt, html) {
  tip.innerHTML = html; tip.style.display = "block";
  tip.style.left = Math.min(evt.clientX + 14, innerWidth - 270) + "px";
  tip.style.top = (evt.clientY + 14) + "px";
}
function hideTip() { tip.style.display = "none"; }

/* ---------- SVG-Balkendiagramm ---------- */
const NS = "http://www.w3.org/2000/svg";
function el(name, attrs, parent) {
  const e = document.createElementNS(NS, name);
  for (const k in attrs) e.setAttribute(k, attrs[k]);
  if (parent) parent.appendChild(e);
  return e;
}
function niceMax(v) {
  const pow = Math.pow(10, Math.floor(Math.log10(v || 1)));
  for (const m of [1, 1.5, 2, 2.5, 3, 4, 5, 7.5, 10]) if (m * pow >= v) return m * pow;
  return 10 * pow;
}
function ticksFor(max) {
  const step = max / 4;
  return [0, step, 2 * step, 3 * step, 4 * step];
}
// groups: [{label, values:{objekt:wert}, tipExtra?:{objekt:string}}]
function barChart(mount, groups, { stacked = false, unit = "CHF", tipLabel = "Wert" } = {}) {
  const W = 460, H = 250, padL = 46, padR = 8, padT = 14, padB = 26;
  const plotW = W - padL - padR, plotH = H - padT - padB;
  const objs = DATA.objects;
  const rawMax = Math.max(...groups.map(g => stacked
    ? objs.reduce((s, o) => s + (g.values[o] || 0), 0)
    : Math.max(...objs.map(o => g.values[o] || 0))));
  const yMax = niceMax(rawMax * 1.12);
  const y = v => padT + plotH - (v / yMax) * plotH;
  const svg = el("svg", { viewBox: `0 0 ${W} ${H}`, width: "100%", role: "img" });

  ticksFor(yMax).forEach(t => {
    el("line", { x1: padL, x2: W - padR, y1: y(t), y2: y(t), stroke: GRID, "stroke-width": 1 }, svg);
    const lb = el("text", { x: padL - 6, y: y(t) + 3, "text-anchor": "end", "font-size": 9, fill: MUTED }, svg);
    lb.textContent = t >= 1000 ? (t / 1000).toLocaleString("de-CH", { maximumFractionDigits: 1 }) + "k" : fmt0(t);
  });
  el("line", { x1: padL, x2: W - padR, y1: y(0), y2: y(0), stroke: AXIS, "stroke-width": 1 }, svg);

  const groupW = plotW / groups.length;
  groups.forEach((g, i) => {
    const cx = padL + groupW * i + groupW / 2;
    const lb = el("text", { x: cx, y: H - 8, "text-anchor": "middle", "font-size": 10.5, fill: INK2 }, svg);
    lb.textContent = g.label;
    if (stacked) {
      const barW = Math.min(46, groupW * .55);
      let acc = 0;
      objs.forEach((o, si) => {
        const v = g.values[o] || 0;
        if (!v) return;
        const isTop = si === objs.length - 1;
        const r = el("rect", { x: cx - barW / 2, y: y(acc + v) + (isTop ? 0 : 2), width: barW,
          height: Math.max(y(acc) - y(acc + v) - 2, 1), rx: isTop ? 4 : 0, fill: COLOR[o] }, svg);
        r.addEventListener("mousemove", e => showTip(e, `<b>${esc(g.label)} · ${esc(o)}</b><br>${tipLabel}: <b>${unit} ${fmt(v)}</b>${g.tipExtra && g.tipExtra[o] ? "<br>" + g.tipExtra[o] : ""}`));
        r.addEventListener("mouseleave", hideTip);
        acc += v;
      });
      const tl = el("text", { x: cx, y: y(acc) - 5, "text-anchor": "middle", "font-size": 10, "font-weight": 650, fill: INK }, svg);
      tl.textContent = fmt(acc);
    } else {
      const n = objs.length, gap = 6;
      const barW = Math.min(34, (groupW * .7 - gap * (n - 1)) / n);
      objs.forEach((o, si) => {
        const v = g.values[o] || 0;
        const x = cx - (n * barW + (n - 1) * gap) / 2 + si * (barW + gap);
        const r = el("rect", { x, y: y(v), width: barW, height: Math.max(y(0) - y(v), 0), rx: 4, fill: COLOR[o] }, svg);
        r.addEventListener("mousemove", e => showTip(e, `<b>${esc(g.label)} · ${esc(o)}</b><br>${tipLabel}: <b>${unit} ${fmt(v)}</b>${g.tipExtra && g.tipExtra[o] ? "<br>" + g.tipExtra[o] : ""}`));
        r.addEventListener("mouseleave", hideTip);
        if (v) {
          const tl = el("text", { x: x + barW / 2, y: y(v) - 4, "text-anchor": "middle", "font-size": 8.5, fill: INK2 }, svg);
          tl.textContent = fmt0(v);
        }
      });
    }
  });
  mount.appendChild(svg);
}

/* ---------- Tabellen ---------- */
function summaryTable(rows, firstColLabel) {
  // rows: [{label, color?, bookings, gross, base, provision, sub?}]
  const wrap = document.createElement("div");
  wrap.className = "card";
  wrap.innerHTML = `<div class="tablewrap"><table>
    <thead><tr><th>${firstColLabel}</th><th class="num">Buchungen</th><th class="num">Umsatz brutto</th><th class="num">Provisionsbasis</th><th class="num">Provision</th><th class="num">Netto Eigentümer</th></tr></thead>
    <tbody>${rows.map(r => `<tr${r.sub ? ' class="sub"' : ""}><td>${r.color ? `<i class="dot" style="background:${r.color}"></i>` : ""}${esc(r.label)}</td><td class="num">${r.bookings}</td><td class="num">${fmt(r.gross)}</td><td class="num">${fmt(r.base)}</td><td class="num">${fmt(r.provision)}</td><td class="num">${fmt(round2(r.base - r.provision))}</td></tr>`).join("")}</tbody>
  </table></div>`;
  return wrap;
}
function grandBar(label, exact, billed) {
  const div = document.createElement("div");
  div.className = "grand";
  const showRounded = billed != null && billed !== exact;
  div.innerHTML = `<span class="t">${label} ${showRounded ? `<small>(exakt ${fmt(exact)}, gerundet auf 5 Rp.)</small>` : ""}</span>
    <span class="v">${DATA.currency} ${fmt(billed != null ? billed : exact)}</span>`;
  return div;
}
function bookingsDetails(bookings) {
  const det = document.createElement("details");
  det.className = "bookings";
  const byMonth = [];
  for (const b of bookings) {
    if (!byMonth.length || byMonth[byMonth.length - 1].month !== b.month) byMonth.push({ month: b.month, items: [] });
    byMonth[byMonth.length - 1].items.push(b);
  }
  det.innerHTML = `<summary>Details pro Buchung (${bookings.length} Buchungen)</summary>
  <div class="tablewrap"><table>
    <thead><tr><th>Gast</th><th>Objekt · Portal</th><th>Aufenthalt</th><th class="num">Brutto</th><th class="num">Kommission</th><th class="num">Pauschale</th><th class="num">Basis</th><th class="num">Provision</th><th class="num">Netto Eigentümer</th></tr></thead>
    <tbody>${byMonth.map(m => `<tr class="month"><td colspan="9">${esc(m.month)}</td></tr>` + m.items.map(b =>
      `<tr><td>${esc(b.guest)}</td><td><i class="dot" style="background:${COLOR[b.object]}"></i>${esc(b.object)} · ${esc(b.portal)}</td><td>${esc(b.stay)}</td><td class="num">${fmt(b.gross)}</td><td class="num">${fmt(b.commission)}</td><td class="num">${fmt(b.cleaning)}</td><td class="num">${fmt(b.base)}</td><td class="num">${fmt(b.provision)}</td><td class="num">${fmt(round2(b.base - b.provision))}</td></tr>`).join("")).join("")}</tbody>
  </table></div>`;
  return det;
}

/* ---------- Quartalsansicht ---------- */
function renderQuarter(q) {
  const view = document.getElementById("view");
  view.appendChild(kpiRow([
    { lbl: `Provision ${q.label}`, val: `<small>${DATA.currency}</small> ${fmt(q.totals.billed != null ? q.totals.billed : q.totals.provision)}`, cap: q.sublabel },
    { lbl: "Netto Eigentümer", val: `<small>${DATA.currency}</small> ${fmt(round2(q.totals.base - q.totals.provision))}`, cap: "nach Kommission, Reinigung & Provision" },
    { lbl: "Umsatz brutto", val: fmt(q.totals.gross), cap: "vor Portal-Kommission" },
    { lbl: "Provisionsbasis", val: fmt(q.totals.base), cap: "nach Kommission & Reinigung" },
    { lbl: "Buchungen", val: String(q.totals.bookings), cap: portalSplit(q.bookings) },
  ]));

  const cards = document.createElement("div");
  cards.className = "cards";
  const c1 = chartCard("Umsatz brutto pro Monat", "");
  const c2 = chartCard("Provision pro Monat", "");
  cards.appendChild(c1); cards.appendChild(c2);
  view.appendChild(cards);
  barChart(c1.querySelector(".mount"), q.months.map(m => ({
    label: m.label,
    values: Object.fromEntries(m.rows.map(r => [r.object, r.gross])),
  })), { tipLabel: "Umsatz brutto" });
  barChart(c2.querySelector(".mount"), q.months.map(m => ({
    label: m.label,
    values: Object.fromEntries(m.rows.map(r => [r.object, r.provision])),
  })), { stacked: true, tipLabel: "Provision" });

  const rows = [];
  for (const m of q.months) {
    for (const r of m.rows) rows.push({ label: `${m.label} · ${r.object}`, color: COLOR[r.object], bookings: r.bookings, gross: r.gross, base: r.base, provision: r.provision });
    rows.push({
      label: `Total ${m.label}`, sub: true,
      bookings: m.rows.reduce((s, r) => s + r.bookings, 0),
      gross: round2(m.rows.reduce((s, r) => s + r.gross, 0)),
      base: round2(m.rows.reduce((s, r) => s + r.base, 0)),
      provision: round2(m.rows.reduce((s, r) => s + r.provision, 0)),
    });
  }
  view.appendChild(summaryTable(rows, "Monat / Objekt"));
  view.appendChild(grandBar(`Total Provision ${q.label}`, q.totals.provision, q.totals.billed));
  if (q.bookings && q.bookings.length) view.appendChild(bookingsDetails(q.bookings));
  document.getElementById("footnote").textContent = `${q.label} · ${q.sublabel}`;
}

/* ---------- Jahresansicht ---------- */
function renderYear(year) {
  const view = document.getElementById("view");
  const qs = DATA.quarters.filter(q => q.year === year);
  const tot = {
    bookings: qs.reduce((s, q) => s + q.totals.bookings, 0),
    gross: round2(qs.reduce((s, q) => s + q.totals.gross, 0)),
    base: round2(qs.reduce((s, q) => s + q.totals.base, 0)),
    provision: round2(qs.reduce((s, q) => s + q.totals.provision, 0)),
    billed: round05(qs.reduce((s, q) => s + (q.totals.billed != null ? q.totals.billed : q.totals.provision), 0)),
  };
  const qLabels = qs.map(q => q.label).join(", ");
  view.appendChild(kpiRow([
    { lbl: `Provision ${year}`, val: `<small>${DATA.currency}</small> ${fmt(tot.billed)}`, cap: `abgerechnet: ${qLabels}` },
    { lbl: "Netto Eigentümer", val: `<small>${DATA.currency}</small> ${fmt(round2(tot.base - tot.provision))}`, cap: "nach Kommission, Reinigung & Provision" },
    { lbl: "Umsatz brutto", val: fmt(tot.gross), cap: "vor Portal-Kommission" },
    { lbl: "Provisionsbasis", val: fmt(tot.base), cap: "nach Kommission & Reinigung" },
    { lbl: "Buchungen", val: String(tot.bookings), cap: portalSplit(qs.flatMap(q => q.bookings || [])) },
  ]));

  const cards = document.createElement("div");
  cards.className = "cards";
  const c1 = chartCard(`Umsatz brutto pro Monat (${year})`, "");
  const c2 = chartCard(`Provision pro Quartal (${year})`, "");
  cards.appendChild(c1); cards.appendChild(c2);
  view.appendChild(cards);
  const monthGroups = qs.flatMap(q => q.months.map(m => ({
    label: m.label.slice(0, 3),
    values: Object.fromEntries(m.rows.map(r => [r.object, r.gross])),
  })));
  barChart(c1.querySelector(".mount"), monthGroups, { tipLabel: "Umsatz brutto" });
  barChart(c2.querySelector(".mount"), qs.map(q => ({
    label: q.label,
    values: Object.fromEntries(DATA.objects.map(o => [o,
      round2(q.months.reduce((s, m) => s + (m.rows.find(r => r.object === o) || { provision: 0 }).provision, 0))])),
  })), { stacked: true, tipLabel: "Provision" });

  const rows = [];
  for (const q of qs) {
    for (const o of DATA.objects) {
      const or = q.months.flatMap(m => m.rows.filter(r => r.object === o));
      if (!or.length) continue;
      rows.push({
        label: `${q.label} · ${o}`, color: COLOR[o],
        bookings: or.reduce((s, r) => s + r.bookings, 0),
        gross: round2(or.reduce((s, r) => s + r.gross, 0)),
        base: round2(or.reduce((s, r) => s + r.base, 0)),
        provision: round2(or.reduce((s, r) => s + r.provision, 0)),
      });
    }
    rows.push({ label: `Total ${q.label}`, sub: true, bookings: q.totals.bookings, gross: q.totals.gross, base: q.totals.base, provision: q.totals.provision });
  }
  view.appendChild(summaryTable(rows, "Quartal / Objekt"));
  view.appendChild(grandBar(`Total Provision ${year}`, tot.provision, tot.billed));
  const note = document.createElement("p");
  note.className = "empty";
  note.style.padding = ".2rem 0 0";
  note.style.textAlign = "left";
  note.style.fontSize = ".78rem";
  note.textContent = qs.length < 4 ? `Jahresansicht ${year}: enthält die bisher abgerechneten Quartale (${qLabels}).` : "";
  view.appendChild(note);
  document.getElementById("footnote").textContent = `Jahresübersicht ${year}`;
}

function portalSplit(bookings) {
  if (!bookings || !bookings.length) return "";
  const counts = {};
  for (const b of bookings) counts[b.portal] = (counts[b.portal] || 0) + 1;
  return Object.entries(counts).map(([p, n]) => `${n} ${p}`).join(" · ");
}

document.getElementById("logout").addEventListener("click", async () => {
  try { await fetch("/api/logout", { method: "POST" }); } catch {}
  location.href = "/";
});

boot();
</script>
</body>
</html>
