<!doctype html>
<html lang="de-CH">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>Kundenportal · Hostflow</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%2317181A%22/><text x=%2250%22 y=%2272%22 font-size=%2260%22 text-anchor=%22middle%22 fill=%22white%22 font-family=%22sans-serif%22 font-weight=%22bold%22>h</text></svg>">
<link rel="stylesheet" href="assets/style.css">
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <img class="logo" src="assets/logo.png" alt="Hostflow">
    <h1>Kundenportal</h1>
    <p class="sub">Melden Sie sich mit Ihren Zugangsdaten an, um Ihre Abrechnungen einzusehen.</p>
    <form id="loginform" autocomplete="off">
      <div class="field">
        <label for="username">Benutzername</label>
        <input id="username" name="username" type="text" autocomplete="username" required autofocus>
      </div>
      <div class="field">
        <label for="code">Zahlencode</label>
        <input id="code" name="code" type="password" inputmode="numeric" pattern="[0-9]*" autocomplete="current-password" required>
      </div>
      <button class="btn" id="loginbtn" type="submit">Anmelden</button>
      <p class="error" id="error">Anmeldung fehlgeschlagen. Bitte Benutzername und Zahlencode prüfen.</p>
    </form>
  </div>
  <p class="login-foot">© 2026 Hostflow · jan@hostflow.ch</p>
</div>
<script>
const form = document.getElementById("loginform");
const btn = document.getElementById("loginbtn");
const err = document.getElementById("error");
form.addEventListener("submit", async (e) => {
  e.preventDefault();
  err.classList.remove("show");
  btn.disabled = true; btn.textContent = "Anmelden…";
  try {
    const res = await fetch("/api/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        username: document.getElementById("username").value,
        code: document.getElementById("code").value,
      }),
    });
    if (res.ok) { location.href = "/portal"; return; }
    err.classList.add("show");
  } catch {
    err.textContent = "Verbindung fehlgeschlagen. Bitte später erneut versuchen.";
    err.classList.add("show");
  }
  btn.disabled = false; btn.textContent = "Anmelden";
});
// Bereits angemeldet? Direkt weiterleiten.
fetch("/api/data").then(r => { if (r.ok) location.href = "/portal"; }).catch(() => {});
</script>
</body>
</html>
